name: Validate JSON

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JSON files are well-formed
        run: |
          find . -name '*.json' -not -path './.git/*' | while read f; do
            echo "Checking $f"
            python3 -m json.tool "$f" > /dev/null
          done
